# Claude Code workflow for Forgejo
# Copy this file to .forgejo/workflows/claude.yml in any repo where you want
# Claude Code available via @claude-bot mentions.
#
# Prerequisites:
#   - claude-bot user created in Forgejo with appropriate access
#   - ANTHROPIC_API_KEY org secret set in mauveHAUS
#   - CLAUDE_GITEA_TOKEN org secret set in mauveHAUS (claude-bot PAT)
#
# Usage:
#   - In an issue or PR comment, mention @claude-bot with a request
#   - Examples:
#     @claude-bot What does this repository do?
#     @claude-bot Review this PR for bugs and security issues
#     @claude-bot Implement a fix for the bug described in this issue

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude-bot')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude-bot')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude-bot'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: https://git.mauve.haus/mirrors/claude-code-gitea-action@v1.0.20
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gitea_token: ${{ secrets.CLAUDE_GITEA_TOKEN }}
          trigger_phrase: "@claude-bot"
          timeout_minutes: "15"
          max_turns: "20"
